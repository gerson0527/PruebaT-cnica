<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <span class="neo-page-title">Categorías</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="categories-content">
  @if (categories.length === 0) {
    <div class="empty-state neo-card">
      <ion-icon name="color-palette-outline" class="empty-icon"></ion-icon>
      <h2>Sin categorías</h2>
      <p>Crea tu primera categoría para organizar tus tareas.</p>
    </div>
  } @else {
    <div class="category-list">
      @for (category of categories; track trackById($index, category)) {
        <ion-item-sliding #slidingItem class="category-slide">
          <ion-item class="category-item" lines="none" button detail="false"
            (click)="editCategory(category)">
            <div class="category-card neo-card">
              <div
                class="color-preview"
                [style.background]="category.color"
                (click)="$event.stopPropagation(); changeColor(category)">
              </div>
              <div class="category-info">
                <h2 class="category-name">{{ category.name }}</h2>
                <p class="category-color-text">{{ category.color }}</p>
              </div>
              <ion-icon
                name="create-outline"
                class="edit-icon"
                (click)="$event.stopPropagation(); editCategory(category)">
              </ion-icon>
            </div>
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option color="tertiary"
              (click)="changeColor(category); slidingItem.close()">
              <ion-icon slot="icon-only" name="color-palette-outline"></ion-icon>
            </ion-item-option>
            <ion-item-option color="danger"
              (click)="deleteCategory(category); slidingItem.close()">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      }
    </div>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="categories-fab">
    <ion-fab-button (click)="addCategory()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
