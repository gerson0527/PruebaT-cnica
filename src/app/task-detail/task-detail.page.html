<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <button type="button" class="neo-icon-btn" (click)="goBack()" aria-label="Volver">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
    </ion-buttons>
    <ion-title>
      <span class="neo-page-title">{{ isEditing ? 'Editar Tarea' : 'Nueva Tarea' }}</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="detail-content">
  <div class="form-container">
    <div class="form-section neo-card">
      <label class="section-label">Título</label>
      <ion-item class="form-item" lines="none">
        <ion-input
          [(ngModel)]="taskTitle"
          placeholder="¿Qué necesitas hacer?"
          type="text"
          class="task-input"
          [clearInput]="true">
        </ion-input>
      </ion-item>
    </div>

    <div class="form-section neo-card">
      <label class="section-label">Categoría</label>
      <ion-item class="form-item" lines="none">
        <ion-select
          [(ngModel)]="selectedCategoryId"
          placeholder="Seleccionar categoría"
          interface="action-sheet"
          class="category-select">
          <ion-select-option [value]="null">Sin categoría</ion-select-option>
          @for (category of categories; track category.id) {
            <ion-select-option [value]="category.id">
              {{ category.name }}
            </ion-select-option>
          }
        </ion-select>
      </ion-item>
    </div>

    @if (showPriority) {
      <div class="form-section neo-card priority-section">
        <label class="section-label">Prioridad</label>
        <div class="priority-buttons">
          @for (p of priorities; track p.value) {
            <button
              type="button"
              class="priority-btn"
              [class.priority-active]="selectedPriority === p.value"
              [style.--priority-color]="p.color"
              (click)="selectPriority(p.value)">
              <ion-icon [name]="p.icon"></ion-icon>
              <span>{{ p.label }}</span>
            </button>
          }
        </div>
      </div>
    }

    <div class="action-section">
      <ion-button
        expand="block"
        class="neo-btn-primary save-button"
        (click)="saveTask()"
        [disabled]="!taskTitle.trim()">
        <ion-icon name="checkmark-outline" slot="start"></ion-icon>
        {{ isEditing ? 'Guardar Cambios' : 'Crear Tarea' }}
      </ion-button>
    </div>
  </div>
</ion-content>
